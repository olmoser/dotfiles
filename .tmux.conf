# True color support
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc,ghostty:Tc"

# Enable mouse
set -g mouse on

# Increase scrollback
set -g history-limit 50000

# Reduce escape delay (important for Vim)
set -sg escape-time 10

# Focus events for Vim autoread
set -g focus-events on

# Pass through extended key sequences (CSI u / kitty protocol)
# so Shift+Enter, Cmd+Enter etc. reach inner applications via tmux
set -s extended-keys on
set -as terminal-features ',ghostty:extkeys'

set -g status-left-length 40
set -g status-right-length 80

set -g status-left '#[fg=#1e1e2e,bg=#89b4fa,bold] #S '   # session name

set -g status-right '#[fg=#cdd6f4] %H:%M  %d %b '        # time & date

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'sainnhe/tmux-fzf'

# Initialize TPM (must be the very last line)
run '~/.tmux/plugins/tpm/tpm'

